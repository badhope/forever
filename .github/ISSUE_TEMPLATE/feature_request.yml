name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ Feature Request

        We love your ideas! Please describe the feature you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: 🎯 Problem Statement
      description: What problem does this feature solve?
      placeholder: Describe the problem or pain point...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: How should this feature work?
      placeholder: Describe your proposed solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives
      description: Any alternative solutions you've considered?
      placeholder: Describe alternatives...

  - type: textarea
    id: context
    attributes:
      label: 📎 Additional Context
      description: Any other context about the feature request?
      placeholder: Add any other context...

  - type: checkboxes
    id: terms
    attributes:
      label: ✅ I have
      options:
        - label: Searched for existing feature requests
          required: true
        - label: This is a unique feature request
          required: true
