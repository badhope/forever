name: 🐛 Bug Report
description: Report a bug to help us improve
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report

        Thank you for reporting a bug! Please help us understand the issue.

  - type: textarea
    id: description
    attributes:
      label: 📝 Bug Description
      description: A clear description of the bug
      placeholder: Describe the bug in detail...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 📋 Steps to Reproduce
      description: How to reproduce this bug
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
      description: What should happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
      description: What actually happens
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 📦 Version
      description: Which version are you using?
      placeholder: "2.0.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📋 Logs
      description: Any relevant logs or error messages
      placeholder: Paste any error logs here...

  - type: dropdown
    id: os
    attributes:
      label: 💻 Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other

  - type: checkboxes
    id: terms
    attributes:
      label: ✅ I have
      options:
        - label: Searched for existing bug reports
          required: true
        - label: Verified the bug exists in the latest version
          required: true
